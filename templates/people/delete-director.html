{% extends 'base.html' %}

{% block title %}Delete Director | CineManager{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card bg-dark-grey text-white border-burgundy">
            <div class="card-header bg-burgundy border-bottom border-gold">
                <h2 class="text-gold mb-0 py-2">Delete Director</h2>
            </div>
            <div class="card-body p-4 text-center">
                <p class="lead mb-4">Are you sure you want to delete the director:</p>
                <h3 class="text-gold mb-5">{{ object.name }}?</h3>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-danger btn-lg">Yes, Delete</button>
                        <a href="{% url 'people:director-detail' object.slug %}" class="btn btn-outline-secondary btn-lg">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
